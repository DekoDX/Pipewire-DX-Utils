context.modules = [
    {   name = libpipewire-module-filter-chain
        flags = [ nofail ]
        args = {
            node.description =  "RNNoise"
            media.name =  "RNNoise"
            filter.graph = {
                nodes = [
                    {
                        type = ladspa
                        name = rnnoise
                        plugin = /usr/lib64/ladspa/librnnoise_ladspa.so
                        label = noise_suppressor_mono # `noise_suppressor_stereo` if you have a stereo microphone
                        control = {
                            "VAD Threshold (%)" = 75.0
                            "VAD Grace Period (ms)" = 200
                            "Retroactive VAD Grace (ms)" = 0
                        }
                    }
                ]
            }
            audio.rate = 48000 # 48000 maximum
            sink.props = {
                node.target = "output.ec_source"
            }
            capture.props = {
                node.name =  "capture.rnnoise_source"
                node.passive = true
            }
            playback.props = {
                node.name =  "output.rnnoise_source"
                media.class = Audio/Source
            }
        }
    }
]
